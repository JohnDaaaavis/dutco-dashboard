<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dutco Construction Co. — Procurement Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--yellow:#F5C400;--yellow-d:#C49B00;--yellow-l:#FFF3B0;
--navy:#003B7A;--navy-m:#0057B3;--navy-l:#1A72CC;--navy-pale:#E8F0FB;
--bg:#F0F4FA;--white:#FFFFFF;--border:#D0DAF0;
--text:#0D1F3C;--muted:#5A6E8C;--faint:#9aaccc;
--ok:#0A7A4B;--ok-bg:#E6F5EE;--warn:#D06A00;--warn-bg:#FFF0DC;
--danger:#C0001A;--danger-bg:#FDECEA;
--font-head:'Barlow Condensed',sans-serif;--font-body:'Barlow',sans-serif;
--radius:8px;--shadow:0 2px 8px rgba(0,59,122,.08);
--s-awaiting:#1a1a1a;--s-dtp:#6b7280;--s-tender:#C0001A;
--s-review:#D06A00;--s-ptc:#8B6914;--s-neg:#C4A020;
--s-obt:#0A7A4B;--s-awarded:#003B7A;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.topnav{background:var(--navy);border-bottom:3px solid var(--yellow);display:flex;align-items:stretch;position:sticky;top:0;z-index:200}
.nav-logo{background:var(--yellow);padding:12px 22px;display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer}
.logo-box{width:38px;height:38px;background:var(--navy);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:800;font-size:15px;color:var(--yellow);letter-spacing:.04em}
.logo-words strong{display:block;font-family:var(--font-head);font-size:18px;font-weight:800;color:var(--navy);letter-spacing:.05em}
.logo-words span{font-size:9px;color:var(--navy);font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.nav-title{padding:0 24px;display:flex;align-items:center;flex:1;gap:8px}
.nav-title h1{font-family:var(--font-head);font-size:20px;font-weight:700;color:#fff;letter-spacing:.04em;text-transform:uppercase}
.nav-badge{background:var(--yellow);color:var(--navy);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;font-family:var(--font-head);letter-spacing:.04em;white-space:nowrap}
.nav-right{padding:0 22px;display:flex;align-items:center;gap:12px;margin-left:auto}
.nav-date{color:rgba(255,255,255,.55);font-size:11px}
.nav-date strong{color:var(--yellow);font-size:12px;display:block}
.btn-nav{display:inline-flex;align-items:center;gap:6px;background:transparent;color:rgba(255,255,255,.7);border:1.5px solid rgba(255,255,255,.3);font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:.04em;padding:6px 14px;border-radius:5px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn-nav:hover{background:rgba(255,255,255,.1);border-color:var(--yellow);color:#fff}
.page{display:none}.page.active{display:block}
#uploadPage{min-height:calc(100vh - 64px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:linear-gradient(160deg,var(--navy-pale) 0%,var(--bg) 60%)}
.upload-hero{text-align:center;max-width:620px;margin-bottom:40px}
.upload-hero h2{font-family:var(--font-head);font-size:36px;font-weight:800;color:var(--navy);letter-spacing:.04em;text-transform:uppercase;line-height:1.1}
.upload-hero h2 span{color:var(--yellow-d)}
.upload-hero p{color:var(--muted);margin-top:10px;line-height:1.6;font-size:14px}
.upload-zone{width:100%;max-width:660px;background:var(--white);border:2px dashed var(--border);border-radius:12px;padding:36px 28px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s,transform .15s;box-shadow:var(--shadow)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--navy);background:var(--navy-pale);transform:translateY(-2px)}
.upload-icon{font-size:48px;margin-bottom:12px;display:block}
.upload-zone h3{font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--navy);letter-spacing:.04em}
.upload-zone p{color:var(--muted);font-size:13px;margin-top:6px}
.upload-zone input[type=file]{display:none}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:#fff;font-family:var(--font-head);font-size:15px;font-weight:700;letter-spacing:.05em;padding:11px 28px;border-radius:6px;border:none;cursor:pointer;transition:background .2s,transform .1s;text-transform:uppercase;margin-top:18px}
.btn-primary:hover{background:var(--navy-m);transform:translateY(-1px)}
.btn-secondary{display:inline-flex;align-items:center;gap:6px;background:transparent;color:var(--navy);border:2px solid var(--navy);font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:.04em;padding:7px 16px;border-radius:5px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn-secondary:hover{background:var(--navy);color:#fff}
.file-queue{width:100%;max-width:660px;margin-top:20px;display:flex;flex-direction:column;gap:8px}
.file-item{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,59,122,.05);animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
.fi-icon{font-size:22px;flex-shrink:0}.fi-info{flex:1;min-width:0}
.fi-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--navy)}
.fi-meta{font-size:11px;color:var(--muted)}
.fi-status{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;font-family:var(--font-head);letter-spacing:.03em}
.fi-ok{background:var(--ok-bg);color:var(--ok)}.fi-err{background:var(--danger-bg);color:var(--danger)}.fi-proc{background:var(--navy-pale);color:var(--navy)}
.fi-rm{background:none;border:none;cursor:pointer;color:var(--faint);font-size:18px;line-height:1;padding:0 4px;transition:color .15s}
.fi-rm:hover{color:var(--danger)}
.upload-actions{display:flex;gap:12px;align-items:center;margin-top:24px;width:100%;max-width:660px;justify-content:center;flex-wrap:wrap}
.upload-progress{width:100%;max-width:660px;margin-top:16px;display:none}
.progress-bar{background:var(--border);border-radius:4px;height:6px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,var(--navy),var(--navy-l));height:100%;width:0;transition:width .3s;border-radius:4px}
.progress-label{font-size:11px;color:var(--muted);margin-top:6px;text-align:center}
.upload-tip{max-width:660px;margin-top:28px;background:var(--yellow-l);border:1px solid var(--yellow);border-radius:8px;padding:12px 18px;font-size:12px;color:var(--navy);line-height:1.6}
.upload-tip strong{font-weight:700}
.dash-controls{background:var(--navy);border-bottom:1px solid rgba(255,255,255,.12);padding:12px 24px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.ctrl-label{font-size:10px;color:rgba(255,255,255,.5);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-right:6px}
.ctrl-select{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 12px;border-radius:5px;font-family:var(--font-body);font-size:13px;cursor:pointer;outline:none;min-width:180px;transition:border-color .2s}
.ctrl-select:hover,.ctrl-select:focus{border-color:var(--yellow)}
.ctrl-select option{background:var(--navy);color:#fff}
.ctrl-grp{display:flex;align-items:center}
.ctrl-right{margin-left:auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ctrl-count{font-size:12px;color:rgba(255,255,255,.5)}.ctrl-count strong{color:var(--yellow);font-size:14px}
.btn-reupload{background:var(--yellow);color:var(--navy);border:none;font-family:var(--font-head);font-size:12px;font-weight:800;letter-spacing:.06em;padding:7px 16px;border-radius:5px;cursor:pointer;text-transform:uppercase;transition:all .15s}
.btn-reupload:hover{background:var(--yellow-d);color:#fff}
.dash-body{padding:22px 24px;display:flex;flex-direction:column;gap:20px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px 14px;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .2s,transform .15s}
.kpi:hover{box-shadow:0 6px 20px rgba(0,59,122,.13);transform:translateY(-2px)}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0}
.kpi.c-navy::after{background:var(--navy)}.kpi.c-yellow::after{background:var(--yellow)}.kpi.c-green::after{background:var(--ok)}.kpi.c-warn::after{background:var(--warn)}.kpi.c-danger::after{background:var(--danger)}
.kpi-ico{position:absolute;top:13px;right:14px;font-size:22px;opacity:.12}
.kpi-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.kpi-val{font-family:var(--font-head);font-size:38px;font-weight:800;line-height:1;margin:5px 0 3px;color:var(--navy)}
.kpi.c-green .kpi-val{color:var(--ok)}.kpi.c-warn .kpi-val{color:var(--warn)}.kpi.c-danger .kpi-val{color:var(--danger)}
.kpi-sub{font-size:11px;color:var(--muted)}
.charts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.chart-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
.chart-card h3{font-family:var(--font-head);font-size:14px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.chart-card p{font-size:11px;color:var(--muted);margin-bottom:14px}
.chart-wrap{position:relative;height:250px}
.table-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.table-head-bar{background:linear-gradient(90deg,var(--navy) 0%,var(--navy-m) 100%);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.table-head-bar h3{font-family:var(--font-head);font-size:17px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.05em}
.table-head-bar p{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.tbl-badge{background:var(--yellow);color:var(--navy);font-size:12px;font-weight:800
